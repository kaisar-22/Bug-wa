<!DOCTYPE html>
<html lang="id">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0a, #000000);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Efek glitch overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,0,100,0.08) 0px, rgba(255,0,100,0.08) 2px, transparent 2px, transparent 8px);

            z-index: 10;
        }

        /* Modal Login */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #0f0f0f;
            border: 2px solid #ff44cc;
            border-radius: 30px;
            padding: 35px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255,68,204,0.5);
            animation: borderNeon 1s infinite alternate;
        }

        @keyframes borderNeon {
            0% { border-color: #ff44cc; box-shadow: 0 0 10px #ff44cc; }
            100% { border-color: #ff88ee; box-shadow: 0 0 35px #ff44cc; }
        }

        .login-box h2 {
            color: #ff44cc;
            margin-bottom: 25px;
            text-shadow: 0 0 8px #ff44cc;
            letter-spacing: 3px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background: #1a1a1a;
            border: 1px solid #ff44cc;
            color: #ffbbdd;
            border-radius: 50px;
            outline: none;
            font-family: monospace;
            text-align: center;
        }

        .login-box button {
            background: #ff44cc;
            color: black;
            border: none;
            padding: 12px;
            margin-top: 15px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: monospace;
            transition: 0.2s;
        }

        .login-box button:active {
            transform: scale(0.96);
            background: #cc33aa;
        }

        /* Intro Screen */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1800;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeOutIntro 4.5s forwards;
        }

        @keyframes fadeOutIntro {
            0% { opacity: 1; visibility: visible; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; display: none; }
        }

        .intro-screen img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #ff44cc;
            box-shadow: 0 0 40px #ff44cc;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .intro-text {
            color: #ff88dd;
            font-size: 1.6rem;
            text-shadow: 0 0 15px #ff44cc;
            text-align: center;
            font-weight: bold;
        }

        /* Dashboard Utama */
        .dashboard {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
            z-index: 100;
        }

        .header {

            border-radius: 35px;

            font-size: 0.8rem;
        }

        .menu-grid {

            gap: 16px;
            margin-bottom: 20px;
        }

            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #ff66cc;
            border-radius: 28px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;

            background: #1f0a1a;
            box-shadow: 0 0 20px #ff66cc;
            border-color: #ff99ee;
        }

        .menu-card .icon {

            margin-bottom: 8px;
        }

        .menu-card .title {
            color: #ffbbee;
            font-weight: bold;

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);

            border-radius: 35px;
            padding: 25px;

            width: 90%;

            overflow-y: auto;
            text-align: center;

            color: #ff44cc;
            margin-bottom: 18px;
        }

            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;

            cursor: pointer;
            font-weight: bold;

        .feature-box button:active {
            transform: scale(0.96);
        }

        .close-modal {
            background: #333;
            color: white;
        }

        .scary-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,68,204,0.15);
            pointer-events: none;
            z-index: 500;
            animation: flashPink 0.2s ease-out;
        }

        @keyframes flashPink {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Audio */
        #bgMusic {
            display: none;
        }
    </style>
</head>
